syntax = "proto3";

package pb;

option go_package = "./;pb";

message MovingDriver {
    int64 driver_id = 1;
    uint32 path_meters = 2;
    uint32 travel_time = 3;
    float lat = 5;
    float lon = 6;
    repeated Coordinates points = 4;
}

message Coordinates {
  repeated float coordinates = 1;
  // float latitude = 1;
  // float longitude = 2;
}
