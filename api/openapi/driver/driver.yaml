openapi: 3.2.0
info:
  title: Driver API
  version: 1.0.0

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: Session cookie set after OAuth login

  schemas:
    Driver:
      type: object
      required:
        - user_id
        - lat
        - lon
        - name
      properties:
        user_id:
          type: integer
          format: int64
        lat:
          type: number
          format: float
        lon:
          type: number
          format: float
        name:
          type: string
        profile_image:
          type: string
        rating:
          type: number
          format: float
        is_available:
          type: boolean
        work_starts:
          type: string
          format: date-time
        work_ends:
          type: string
          format: date-time
        phone:
          type: string
        address:
          type: string
          description: Reverse-geocoded address of the driver's location
        max_car_weight_kg:
          type: integer
          description: Maximum car weight in kg for tow drivers
        max_car_length_meters:
          type: number
          format: float
          description: Maximum car length in meters for tow drivers

    DriverProfile:
      type: object
      required:
        - name
        - lat
        - lon
      properties:
        name:
          type: string
          description: Driver's display name
        lat:
          type: number
          format: float
          description: Latitude (WGS84)
        lon:
          type: number
          format: float
          description: Longitude (WGS84)
        work_starts:
          type: string
          format: time
          description: Start of work time (HH:MM:SS)
        work_ends:
          type: string
          format: time
          description: End of work time (HH:MM:SS)
        phone:
          type: string
          description: Driver phone number
        max_car_weight_kg:
          type: integer
          description: Maximum car weight in kg for tow drivers
        max_car_length_meters:
          type: number
          format: float
          description: Maximum car length in meters for tow drivers

paths:
  /driver/profile:
    post:
      summary: Create driver profile
      description: Creates a driver profile for the authenticated user. Each user can have at most one driver profile.
      operationId: createDriverProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverProfile'
      responses:
        '201':
          description: Driver profile created successfully
        '400':
          description: Invalid input or driver profile already exists
        '401':
          description: Unauthorized (no valid session)
      security:
        - CookieAuth: []
    get:
      summary: Get my driver profile
      description: Returns the driver profile for the authenticated user.
      operationId: getMyDriverProfile
      responses:
        '200':
          description: Driver profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Driver'
        '401':
          description: Unauthorized (no valid session)
        '404':
          description: Driver profile not found
      security:
        - CookieAuth: []
    put:
      summary: Update driver profile
      description: Updates the driver profile for the authenticated user.
      operationId: updateDriverProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverProfile'
      responses:
        '200':
          description: Driver profile updated successfully
        '400':
          description: Invalid input
        '401':
          description: Unauthorized (no valid session)
        '404':
          description: Driver profile not found
      security:
        - CookieAuth: []

  /driver/{user_id}:
    get:
      operationId: getDriverByUserId
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Driver details
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/Driver'

        '404':
          description: Driver not found

  /driver/filter:
    post:
      operationId: getFilteredDrivers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_lat
                - user_lon
              properties:
                user_lat:
                  type: number
                  format: float
                  description: Latitude (WGS84)
                user_lon:
                  type: number
                  format: float
                  description: Longitude (WGS84)
                work_starts:
                  type: string
                work_ends:
                  type: string
                min_rating:
                  type: number
                  format: float
      responses:
        '200':
          description: Driver details
          content:
            application/json:
              schema:
                type: object
                properties:
                  drivers:
                    type: array
                    items:
                      type: object
                      $ref: '#/components/schemas/Driver'
        '404':
          description: Driver not found
