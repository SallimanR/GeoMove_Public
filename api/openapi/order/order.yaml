openapi: 3.2.0
info:
  title: Order API
  version: 1.0.0

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: Session cookie set after OAuth login

  schemas:
    Order:
      type: object
      required:
        - id
        - customer_id
        - from_lat
        - from_lon
        - to_lat
        - to_lon
        - how_many_wheels_blocked
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        customer_id:
          type: integer
          format: int64
        driver_id:
          type: integer
          format: int64
          nullable: true
        from_lat:
          type: number
          format: float
        from_lon:
          type: number
          format: float
        from_address:
          type: string
        to_lat:
          type: number
          format: float
        to_lon:
          type: number
          format: float
        to_address:
          type: string
        total_distance_meters:
          type: integer
          nullable: true
        how_many_wheels_blocked:
          type: integer
        price_rubles:
          type: integer
          nullable: true
        status:
          type: string
          enum: [forming, pending, accepted, in_progress, completed, cancelled]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time
          nullable: true
        picked_up_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        cancelled_at:
          type: string
          format: date-time
          nullable: true
        cancellation_reason:
          type: string
          nullable: true

    CreateOrderRequest:
      type: object
      required:
        - from_lat
        - from_lon
        - to_lat
        - to_lon
        - how_many_wheels_blocked
      properties:
        from_lat:
          type: number
          format: float
        from_lon:
          type: number
          format: float
        from_address:
          type: string
        to_lat:
          type: number
          format: float
        to_lon:
          type: number
          format: float
        to_address:
          type: string
        how_many_wheels_blocked:
          type: integer
        total_distance_meters:
          type: integer
          nullable: true
        price_rubles:
          type: integer
          nullable: true

    UpdateOrderStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [forming, pending, accepted, in_progress, completed, cancelled]
        cancellation_reason:
          type: string

    UpdateOrderRequest:
      type: object
      required:
        - from_lat
        - from_lon
        - to_lat
        - to_lon
        - how_many_wheels_blocked
      properties:
        from_lat:
          type: number
          format: float
        from_lon:
          type: number
          format: float
        from_address:
          type: string
        to_lat:
          type: number
          format: float
        to_lon:
          type: number
          format: float
        to_address:
          type: string
        how_many_wheels_blocked:
          type: integer
        total_distance_meters:
          type: integer
          nullable: true
        price_rubles:
          type: integer
          nullable: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: string

paths:
  /order:
    post:
      operationId: createOrder
      summary: Create a new tow order
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized

  /order/my:
    get:
      operationId: listMyOrders
      summary: List orders for the authenticated user
      security:
        - CookieAuth: []
      parameters:
        - name: role
          in: query
          required: true
          schema:
            type: string
            enum: [customer, driver]
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
        '401':
          description: Unauthorized

  /order/{order_id}:
    get:
      operationId: getOrder
      summary: Get order by ID
      security:
        - CookieAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Order not found
        '401':
          description: Unauthorized
    put:
      operationId: updateOrder
      summary: Update order details (forming/pending only)
      security:
        - CookieAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderRequest'
      responses:
        '200':
          description: Order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid input or order cannot be edited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
        '401':
          description: Unauthorized

  /order/{order_id}/status:
    patch:
      operationId: updateOrderStatus
      summary: Update order status
      security:
        - CookieAuth: []
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
        '401':
          description: Unauthorized
