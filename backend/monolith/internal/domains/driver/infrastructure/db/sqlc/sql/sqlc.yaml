version: "2"
sql:
  - engine: "postgresql"
    queries: "."
    schema: "../../../../../../../migrations"
    gen:
      go:
        package: "sqlc"
        out: ".."
        sql_package: "pgx/v5"

        # emit_pointers_for_null_types: true
        # emit_empty_slices: true
        overrides:
          - column: "driver.id"
            go_type: "uint32"
