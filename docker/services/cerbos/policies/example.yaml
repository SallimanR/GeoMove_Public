---
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: "default"
  resource: "blog_post"
  rules:
    # RULE 1: Members can create posts
    - actions: ["create"]
      effect: EFFECT_ALLOW
      roles: ["member"]

    # RULE 2: Members can view, update, delete their OWN posts (ABAC)
    - actions: ["view", "update", "delete"]
      effect: EFFECT_ALLOW
      roles: ["member"]
      condition:
        match:
          expr: request.resource.attr.ownerId == request.principal.id

    # RULE 3: Moderators can view, update, delete, flag ANY post
    - actions: ["view", "update", "delete", "flag"]
      effect: EFFECT_ALLOW
      roles: ["moderator"]
