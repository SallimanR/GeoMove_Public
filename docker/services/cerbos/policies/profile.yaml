---
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: "default"
  resource: "driver"
  rules:
    # - actions: ["create"]
    #   effect: EFFECT_ALLOW
    #   roles: ["user"]

    - actions: ["view", "create", "update", "delete"]
      effect: EFFECT_ALLOW
      roles: ["driver"]
      condition:
        match:
          expr: request.resource.attr.ownerId == request.principal.id

    - actions: ["view", "create", "update", "delete", "flag"]
      effect: EFFECT_ALLOW
      roles: ["admin"]
