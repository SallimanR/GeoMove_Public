services:
  nginx:
    image: docker.io/library/nginx:mainline-alpine3.23
    container_name: tow-nginx
    ports:
      - "8050:443/tcp"
      - "8050:443/udp"
      - "80:80/tcp"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs/nginx-selfsigned.crt:/etc/nginx/tls/localhost.crt:ro
      - ./certs/nginx-selfsigned.key:/etc/nginx/tls/localhost.key:ro
      - ../../../data/maps:/data/maps:ro
      - ../../../data/static:/data/static:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - tow-network

networks:
  tow-network:
    driver: bridge
