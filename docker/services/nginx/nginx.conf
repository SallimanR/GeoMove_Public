worker_processes auto;

events {
    worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	ssl_session_cache   shared:SSL:10m;
	ssl_session_timeout 10m;

	gzip              on;
	gzip_vary         on;
	gzip_proxied      any;
	gzip_comp_level   6;
	gzip_buffers      16 8k;
	gzip_http_version 1.1;
	gzip_min_length   256;
	gzip_types        text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json application/x-protobuf image/png;

	server {
		listen 80;
		server_name evakuacia24.ru;

		location /.well-known/acme-challenge/ {
			root /var/www/certbot;
		}

		location / {
			return 301 https://$host$request_uri;
		}
	}

	server {
		listen 443 ssl;
		http2 on;

		server_name evakuacia24.ru;

		ssl_certificate /etc/letsencrypt/live/evakuacia24.ru/fullchain.pem;
		ssl_certificate_key /etc/letsencrypt/live/evakuacia24.ru/privkey.pem;
		ssl_protocols TLSv1.2 TLSv1.3;
		ssl_prefer_server_ciphers on;

		add_header 'Access-Control-Allow-Origin' '*' always;
		add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
		add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;

		location /.well-known/acme-challenge/ {
			root /var/www/certbot;
		}

		location /tiles/ {
			alias /data/maps/;
			types {
				application/octet-stream pmtiles;
			}
			expires 1y;
			add_header Cache-Control "public, immutable" always;
			add_header 'Access-Control-Allow-Origin' '*' always;
			add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
			add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
		}
		location /style/ {
			alias /data/maps/style/;
			types {
				application/json json;
				image/png png;
				image/svg+xml svg;
				application/octet-stream;
			}
			expires 1y;
			add_header Cache-Control "public, immutable" always;
			add_header 'Access-Control-Allow-Origin' '*' always;
			add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
			add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
		}
		location /fonts/ {
			alias /data/maps/fonts/;
			types {
				application/octet-stream;
			}
			expires 1y;
			add_header Cache-Control "public, immutable" always;
			add_header 'Access-Control-Allow-Origin' '*' always;
			add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
			add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
		}

		location /photon/ {
			proxy_pass http://geoproj-photon:2322/;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_set_header X-Forwarded-Host $host;
			proxy_set_header X-Forwarded-Port $server_port;
		}
		location /routing/ {
			proxy_pass http://host.docker.internal:8989/;
			proxy_hide_header Access-Control-Allow-Origin;
			proxy_hide_header Access-Control-Allow-Methods;
			proxy_hide_header Access-Control-Allow-Headers;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_set_header X-Forwarded-Host $host;
			proxy_set_header X-Forwarded-Port $server_port;
			add_header 'Access-Control-Allow-Origin' '*' always;
			add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
			add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
		}

		location /static/ {
			alias /data/static/;
		}
		location /static/avatars/ {
			alias /data/static/avatars/;
			expires 30d;
			add_header Cache-Control "public, immutable";
		}
	}
}
