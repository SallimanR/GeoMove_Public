worker_processes auto;

events {
    worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	ssl_session_cache   shared:SSL:10m;
	ssl_session_timeout 10m;

	gzip              on;
	gzip_vary         on;
	gzip_proxied      any;
	gzip_comp_level   6;
	gzip_buffers      16 8k;
	gzip_http_version 1.1;
	gzip_min_length   256;
	gzip_types        text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json application/x-protobuf;

	server {
		listen 443 ssl;
		http2 on;

		listen 443 quic reuseport;
		http3 on;

		server_name localhost;

		# root /data;
		ssl_certificate /etc/nginx/tls/localhost.crt;
		ssl_certificate_key /etc/nginx/tls/localhost.key;
		ssl_protocols TLSv1.3;

		# add_header Alt-Svc 'h3=":443"; ma=86400' always;

		add_header 'Access-Control-Allow-Origin' '*' always;
		add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
		add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;

		location /tiles/ {
			alias /data/maps/;
			types {
				application/octet-stream pmtiles;
			}
			expires 1y;
			add_header Cache-Control "public, immutable" always;
			add_header 'Access-Control-Allow-Origin' '*' always;
			add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
			add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
		}
		location /style/ {
			alias /data/maps/style/;
			types {
				application/json json;
				application/octet-stream;
			}
			expires 1y;

			# add_header Cache-Control "public, immutable";
			# add_header Alt-Svc 'h3=":443"; ma=86400' always;
		}
		location /fonts/ {
			alias /data/maps/fonts/;
			expires 1y;

			types {
				application/json json;
				application/octet-stream;
			}

			# add_header Cache-Control "public, immutable";
			# add_header Alt-Svc 'h3=":443"; ma=86400' always;
		}

		location /static/ {
			alias /data/static/;
		}
		location /static/avatars/ {
			alias /data/static/avatars/;
			expires 30d;
			add_header Cache-Control "public, immutable";
		}
	}
}
